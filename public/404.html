<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>The Linen Solutions</title>
    <!-- Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
      // pathSegmentsToKeep = 0 for a custom domain / user root site.
      // Set to 1 if you host at username.github.io/thelinensolutions/.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
